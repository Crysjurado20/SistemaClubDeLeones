<p-confirmDialog [style]="{ width: '450px' }"></p-confirmDialog>

<p-toolbar styleClass="mb-4 gap-2">
  <ng-template #start>
    <p-button
      label="Nuevo"
      icon="pi pi-plus"
      severity="secondary"
      [outlined]="true"
      styleClass="mr-2"
      (onClick)="openNew()"
    />
    <p-button
      label="Eliminar"
      icon="pi pi-trash"
      severity="secondary"
      [outlined]="true"
      (onClick)="deleteSelectedItems()"
      [disabled]="!selectedItems || !selectedItems.length"
    />
  </ng-template>
  <ng-template #end>
    <p-button label="Exportar" icon="pi pi-upload" severity="secondary" [outlined]="true" />
  </ng-template>
</p-toolbar>

<p-table
  #dt
  [value]="items"
  [columns]="columns"
  [rows]="10"
  [paginator]="true"
  [globalFilterFields]="globalFilterFields"
  [(selection)]="selectedItems"
  [rowHover]="true"
  dataKey="id"
  currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} registros"
  [showCurrentPageReport]="true"
>
  <ng-template #caption>
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
      <h5 class="m-0 font-bold text-center md:text-left">{{ title }}</h5>
      <p-iconfield class="w-full md:w-auto">
        <p-inputicon styleClass="pi pi-search" />
        <input
          pInputText
          type="text"
          (input)="onGlobalFilter(dt, $event)"
          placeholder="Buscar..."
          class="w-full sm:w-auto"
        />
      </p-iconfield>
    </div>
  </ng-template>

  <ng-template #header let-columns>
    <tr>
      <th scope="col" style="width: 3rem" class="text-center"><p-tableHeaderCheckbox /></th>
      <th scope="col" *ngIf="expandable" style="width: 3rem" class="text-center"></th>
      <th
        *ngFor="let col of columns"
        scope="col"
        [pSortableColumn]="col.field"
        [ngClass]="col.type === 'currency' ? 'text-right' : 'text-left'"
      >
        {{ col.header }} <p-sortIcon [field]="col.field" />
      </th>
      <th scope="col" class="text-center">Acciones</th>
    </tr>
  </ng-template>

  <ng-template #body let-rowData let-columns="columns" let-expanded="expanded">
    <tr>
      <td class="text-center"><p-tableCheckbox [value]="rowData" /></td>

      <td *ngIf="expandable" class="text-center">
        <p-button
          type="button"
          pRipple
          [pRowToggler]="rowData"
          [text]="true"
          [rounded]="true"
          [plain]="true"
          [icon]="expanded ? 'pi pi-chevron-down' : 'pi pi-chevron-right'"
        />
      </td>

      <td *ngFor="let col of columns" [ngClass]="col.type === 'currency' ? 'text-right' : 'text-left'">
        <ng-container *ngIf="!col.type || col.type === 'text'">
          {{ rowData[col.field] }}
        </ng-container>

        <ng-container *ngIf="col.type === 'currency'">
          {{ rowData[col.field] | currency: 'USD' }}
        </ng-container>

        <ng-container *ngIf="col.type === 'array'">
          <span
            *ngFor="let item of rowData[col.field]; let last = last"
            class="mr-1 mb-1 inline-block"
          >
            <p-tag styleClass="bg-yellow-400 text-gray-900 font-bold px-2 py-1">
              {{ item.name ? item.name : item }}
            </p-tag>
          </span>
        </ng-container>
      </td>

      <td class="text-center whitespace-nowrap">
        <p-button
          icon="pi pi-pencil"
          class="mr-2"
          [rounded]="true"
          [outlined]="true"
          (onClick)="editItem(rowData)"
        />
        <p-button
          icon="pi pi-trash"
          severity="danger"
          [rounded]="true"
          [outlined]="true"
          (onClick)="deleteItem(rowData)"
        />
      </td>
    </tr>
  </ng-template>

  <ng-template #expandedrow let-rowData let-columns="columns">
    <tr>
      <td [attr.colspan]="columns.length + 3">
        <div class="p-4 bg-surface-50 dark:bg-surface-800 rounded-lg shadow-inner mx-4">
          <p-table [value]="rowData[expandedArrayField]" [columns]="expandedColumns" dataKey="name">
            <ng-template #header let-expColumns>
              <tr>
                <th
                  *ngFor="let col of expColumns"
                  scope="col"
                  [ngClass]="col.type === 'currency' ? 'text-right' : 'text-left'"
                >
                  {{ col.header }}
                </th>
              </tr>
            </ng-template>

            <ng-template #body let-item let-expColumns="columns">
              <tr>
                <td *ngFor="let col of expColumns" [ngClass]="col.type === 'currency' ? 'text-right' : 'text-left'">
                  <ng-container *ngIf="!col.type || col.type === 'text'">
                    {{ item[col.field] }}
                  </ng-container>

                  <ng-container *ngIf="col.type === 'currency'">
                    <span class="font-semibold text-green-600 dark:text-green-400">
                      {{
                        item[col.field] !== undefined
                          ? (item[col.field] | currency: 'USD')
                          : 'No asignado'
                      }}
                    </span>
                  </ng-container>
                </td>
              </tr>
            </ng-template>

            <ng-template #empty>
              <tr>
                <td [attr.colspan]="expandedColumns.length" class="text-center text-gray-500 p-4">
                  No hay datos registrados.
                </td>
              </tr>
            </ng-template>
          </p-table>
        </div>
      </td>
    </tr>
  </ng-template>
</p-table>
