<div class="layout-topbar">
    <div class="layout-topbar-logo-container">
        @if (showMenuToggle()) {
        <button type="button" class="layout-menu-button layout-topbar-action" (click)="onMenuToggle()"
            aria-label="Abrir o cerrar menú">
            <i class="pi pi-bars" aria-hidden="true"></i>
        </button>
        }

        <a class="layout-topbar-logo" [routerLink]="homeLink()">
            <img [ngSrc]="logoSrc()" [alt]="logoAlt()" width="48" height="48" class="mr-2" />
            <span>{{ title() }}</span>
        </a>
    </div>

    @if (showActions()) {
    <div class="layout-topbar-actions">
        <button type="button" class="layout-topbar-menu-button layout-topbar-action" pStyleClass="@next"
            enterFromClass="hidden" enterActiveClass="animate-scalein" leaveToClass="hidden"
            leaveActiveClass="animate-fadeout" [hideOnOutsideClick]="true" aria-label="Mostrar opciones">
            <i class="pi pi-ellipsis-v" aria-hidden="true"></i>
        </button>

        <div class="layout-topbar-menu hidden lg:block">
            <div class="layout-topbar-menu-content">
                @if (showThemeToggle()) {
                <button type="button" class="layout-topbar-action" (click)="toggleDarkMode()"
                    [attr.aria-label]="darkTheme() ? 'Activar modo claro' : 'Activar modo oscuro'"
                    [attr.aria-pressed]="darkTheme()">
                    <i class="pi transition-colors duration-200" [class.pi-sun]="darkTheme()"
                        [class.pi-moon]="!darkTheme()" [class.text-blue-500]="darkTheme()" aria-hidden="true"></i>
                    <span>{{ darkTheme() ? 'Modo claro' : 'Modo oscuro' }}</span>
                </button>
                }

                <ng-content select="[navbar-actions]"></ng-content>

                <div class="layout-topbar-accessibility">
                    <button
                        type="button"
                        class="layout-topbar-action layout-topbar-action-accessibility"
                        (click)="toggleAccessibilityPanel()"
                        [attr.aria-expanded]="accessibilityOpen()"
                        aria-controls="topbar-accessibility-panel"
                        aria-label="Opciones de accesibilidad"
                    >
                        <i class="pi pi-eye" aria-hidden="true"></i>
                        <span>Accesibilidad</span>
                    </button>

                    @if (accessibilityOpen()) {
                    <div id="topbar-accessibility-panel" class="topbar-a11y-panel" role="region" aria-label="Opciones de accesibilidad">
                        <p class="topbar-a11y-panel__title">Accesibilidad</p>

                        <div class="topbar-a11y-panel__section">
                            <span class="topbar-a11y-panel__label">Tamaño de letra</span>
                            <div class="topbar-a11y-segmented">
                                <button type="button" class="topbar-a11y-segmented__btn" [class.is-active]="fontScale() === 'xsmall'" (click)="setFontScale('xsmall')">A--</button>
                                <button type="button" class="topbar-a11y-segmented__btn" [class.is-active]="fontScale() === 'small'" (click)="setFontScale('small')">A-</button>
                                <button type="button" class="topbar-a11y-segmented__btn" [class.is-active]="fontScale() === 'normal'" (click)="setFontScale('normal')">A</button>
                                <button type="button" class="topbar-a11y-segmented__btn" [class.is-active]="fontScale() === 'large'" (click)="setFontScale('large')">A+</button>
                                <button type="button" class="topbar-a11y-segmented__btn" [class.is-active]="fontScale() === 'xlarge'" (click)="setFontScale('xlarge')">A++</button>
                            </div>
                        </div>

                        <div class="topbar-a11y-panel__section">
                            <span class="topbar-a11y-panel__label">Espaciado de lectura</span>
                            <div class="topbar-a11y-segmented">
                                <button
                                    type="button"
                                    class="topbar-a11y-segmented__btn"
                                    [class.is-active]="textSpacing() === 'normal'"
                                    (click)="setTextSpacing('normal')"
                                >
                                    Normal
                                </button>
                                <button
                                    type="button"
                                    class="topbar-a11y-segmented__btn"
                                    [class.is-active]="textSpacing() === 'wide'"
                                    (click)="setTextSpacing('wide')"
                                >
                                    Amplio
                                </button>
                            </div>
                        </div>

                        <div class="topbar-a11y-panel__section">
                            <button
                                type="button"
                                class="topbar-a11y-toggle"
                                [class.is-active]="reducedMotion()"
                                (click)="toggleReducedMotion()"
                            >
                                Reducir movimiento
                            </button>
                        </div>
                    </div>
                    }
                </div>

                @if (showUser()) {
                <button type="button"
                    class="layout-topbar-action layout-topbar-action-user w-auto px-4 flex items-center gap-2"
                    aria-label="Usuario">
                    <i class="pi pi-user" aria-hidden="true"></i>
                    <span class="block font-semibold text-sm">{{ userLabel() }}</span>
                </button>
                }

                @if (showLogout()) {
                <button type="button" class="layout-topbar-action layout-topbar-action-logout" (click)="onLogout()" aria-label="Salir">
                    <i class="pi pi-sign-out" aria-hidden="true"></i>
                    <span>Salir</span>
                </button>
                }
            </div>
        </div>
    </div>
    }
</div>
