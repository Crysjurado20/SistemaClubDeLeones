<a class="flex items-center">
    <img src="img/logo_Leones.png" alt="Logo Club de Leones" class="h-12 mr-2" />
    <span class="text-surface-900 dark:text-surface-0 font-medium text-2xl leading-normal mr-20">Club de Leones</span>
</a>

<a pButton [text]="true" severity="secondary" [rounded]="true" pRipple class="lg:hidden!" pStyleClass="@next"
    enterFromClass="hidden" leaveToClass="hidden" [hideOnOutsideClick]="true">
    <i class="pi pi-bars text-2xl!"></i>
</a>

<div
    class="items-center bg-surface-0 dark:bg-surface-900 grow justify-between hidden lg:flex absolute lg:static w-full left-0 top-full px-12 lg:px-0 z-20 rounded-border">
    <ul class="list-none p-0 m-0 flex lg:items-center select-none flex-col lg:flex-row cursor-pointer gap-8">
        <li>
            <a (click)="router.navigate(['/landing'], { fragment: 'home' })" pRipple
                class="px-0 py-4 text-surface-900 dark:text-surface-0 font-medium text-xl">
                <span>Inicio</span>
            </a>
        </li>
        <li>
            <a (click)="router.navigate(['/landing'], { fragment: 'features' })" pRipple
                class="px-0 py-4 text-surface-900 dark:text-surface-0 font-medium text-xl">
                <span>Servicios</span>
            </a>
        </li>
        <li>
            <a (click)="router.navigate(['/landing'], { fragment: 'highlights' })" pRipple
                class="px-0 py-4 text-surface-900 dark:text-surface-0 font-medium text-xl">
                <span>Nosotros</span>
            </a>
        </li>
        <li>
            <a (click)="router.navigate(['/landing'], { fragment: 'contact' })" pRipple
                class="px-0 py-4 text-surface-900 dark:text-surface-0 font-medium text-xl">
                <span>Contacto</span>
            </a>
        </li>
    </ul>
    <div class="flex border-t lg:border-t-0 border-surface py-4 lg:py-0 mt-4 lg:mt-0 gap-2">
        <div class="landing-a11y-wrapper">
            <button
                pButton
                pRipple
                [rounded]="true"
                [text]="true"
                icon="pi pi-eye"
                label="Accesibilidad"
                class="landing-text-action"
                (click)="toggleAccessibilityPanel()"
                [attr.aria-expanded]="accessibilityOpen()"
                aria-controls="landing-a11y-panel"
            ></button>

            @if (accessibilityOpen()) {
            <div id="landing-a11y-panel" class="landing-a11y-panel" role="region" aria-label="Opciones de accesibilidad">
                <p class="landing-a11y-panel__title">Accesibilidad</p>

                <div class="landing-a11y-panel__section">
                    <span class="landing-a11y-panel__label">Tamaño de letra</span>
                    <div class="landing-a11y-segmented">
                        <button type="button" class="landing-a11y-segmented__btn" [class.is-active]="fontScale() === 'xsmall'" (click)="setFontScale('xsmall')">A--</button>
                        <button type="button" class="landing-a11y-segmented__btn" [class.is-active]="fontScale() === 'small'" (click)="setFontScale('small')">A-</button>
                        <button type="button" class="landing-a11y-segmented__btn" [class.is-active]="fontScale() === 'normal'" (click)="setFontScale('normal')">A</button>
                        <button type="button" class="landing-a11y-segmented__btn" [class.is-active]="fontScale() === 'large'" (click)="setFontScale('large')">A+</button>
                        <button type="button" class="landing-a11y-segmented__btn" [class.is-active]="fontScale() === 'xlarge'" (click)="setFontScale('xlarge')">A++</button>
                    </div>
                </div>

                <div class="landing-a11y-panel__section">
                    <span class="landing-a11y-panel__label">Espaciado de lectura</span>
                    <div class="landing-a11y-segmented">
                        <button type="button" class="landing-a11y-segmented__btn" [class.is-active]="textSpacing() === 'normal'" (click)="setTextSpacing('normal')">Normal</button>
                        <button type="button" class="landing-a11y-segmented__btn" [class.is-active]="textSpacing() === 'wide'" (click)="setTextSpacing('wide')">Amplio</button>
                    </div>
                </div>

                <div class="landing-a11y-panel__section">
                    <button
                        type="button"
                        class="landing-a11y-toggle"
                        [class.is-active]="reducedMotion()"
                        (click)="toggleReducedMotion()"
                    >
                        Reducir movimiento
                    </button>
                </div>
            </div>
            }
        </div>

        <button pButton pRipple [label]="darkTheme() ? 'Modo claro' : 'Modo oscuro'"
            [icon]="darkTheme() ? 'pi pi-sun' : 'pi pi-moon'" [rounded]="true" [text]="true" (click)="toggleDarkMode()"
            [attr.aria-label]="darkTheme() ? 'Activar modo claro' : 'Activar modo oscuro'"
            [attr.aria-pressed]="darkTheme()" class="landing-text-action"></button>

        @if (isLoggedIn()) {
        <button pButton pRipple label="Home" icon="pi pi-home" [rounded]="true" (click)="goHomeByRole()"></button>
        } @else {
        <button pButton pRipple label="Iniciar sesión" routerLink="/auth/login" [rounded]="true" [text]="true"
            class="landing-text-action"></button>
        <button pButton pRipple label="Registrarse" routerLink="/auth/register" [rounded]="true"></button>
        }
    </div>
</div>
