<div
  class="relative w-full min-h-[calc(100vh-5rem)] overflow-hidden flex flex-col items-center p-2 md:p-6 rounded-xl"
>
  <div aria-hidden="true" class="pointer-events-none absolute inset-0 z-0">
    <div class="absolute -left-40 top-10 w-[34rem] h-16 bg-yellow-400 -rotate-45 opacity-90"></div>
    <div class="absolute -left-56 top-24 w-[34rem] h-16 bg-yellow-300 -rotate-45 opacity-70"></div>
    <div
      class="absolute -left-56 top-20 w-[36rem] h-1 -rotate-45"
      style="background-color: var(--primary-color)"
    ></div>
    <div
      class="absolute left-14 bottom-24 w-16 h-16 rounded-full bg-surface-200 dark:bg-surface-700 opacity-80"
    ></div>
    <div
      class="absolute right-16 bottom-36 w-20 h-20 rounded-full opacity-70 flex items-center justify-center shadow-lg"
      style="background-color: var(--primary-color)"
    >
      <span
        class="text-yellow-400 font-serif font-bold text-5xl drop-shadow-md"
        style="font-family: 'Times New Roman', serif"
        >L</span
      >
    </div>
    <svg
      class="absolute -left-40 -bottom-40 w-[520px] h-[520px] opacity-95"
      viewBox="0 0 600 600"
      fill="none"
    >
      <path
        d="M120 480C180 330 320 250 480 240"
        stroke="var(--primary-color)"
        stroke-width="26"
        stroke-linecap="round"
      />
      <path
        d="M170 520C250 330 390 270 540 260"
        class="text-yellow-400"
        stroke="currentColor"
        stroke-width="26"
        stroke-linecap="round"
      />
    </svg>
  </div>

  <div class="relative z-10 w-full max-w-7xl mx-auto flex flex-col gap-4">
    <div
      class="card shadow-md p-4 md:p-6 bg-surface-0 dark:bg-surface-900 rounded-xl border border-surface-200 dark:border-surface-700"
    >
      <div
        class="font-bold text-2xl text-surface-900 dark:text-surface-0 mb-4 flex items-center gap-2"
      >
        <i class="pi pi-filter text-primary text-2xl"></i>
        Parámetros del Reporte
      </div>

      <p-fluid class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
        <div class="field md:col-span-2">
          <label class="font-bold mb-2 block"
            >Seleccione el Reporte <span class="text-red-500">*</span></label
          >
          <p-select
            [options]="tiposReporte"
            [(ngModel)]="reporteSeleccionado"
            optionLabel="nombre"
            placeholder="Ej: Consolidado de Ingresos"
            styleClass="w-full"
          >
          </p-select>
        </div>

        <div class="field">
          <label class="font-bold mb-2 block">Fecha Inicio</label>
          <p-datepicker
            [(ngModel)]="fechaInicio"
            placeholder="dd/mm/aaaa"
            dateFormat="dd/mm/yy"
            [showIcon]="true"
          ></p-datepicker>
        </div>

        <div class="field">
          <label class="font-bold mb-2 block">Fecha Fin</label>
          <p-datepicker
            [(ngModel)]="fechaFin"
            placeholder="dd/mm/aaaa"
            dateFormat="dd/mm/yy"
            [showIcon]="true"
          ></p-datepicker>
        </div>
      </p-fluid>

      <div class="flex justify-end mt-4 gap-2">
        <p-button
          label="Limpiar"
          icon="pi pi-eraser"
          severity="secondary"
          [outlined]="true"
        ></p-button>
        <p-button
          label="Generar Reporte"
          icon="pi pi-search"
          (onClick)="generarReporte()"
        ></p-button>
      </div>
    </div>

    <div
      class="card shadow-md p-4 md:p-6 bg-surface-0 dark:bg-surface-900 rounded-xl border border-surface-200 dark:border-surface-700"
      *ngIf="columnasDinamicas.length > 0"
    >
      <div class="flex flex-col sm:flex-row justify-between items-center mb-4 gap-3">
        <div class="text-xl font-bold text-primary">{{ reporteSeleccionado?.nombre }}</div>
        <div class="flex gap-2">
          <p-button
            label="Excel"
            icon="pi pi-file-excel"
            severity="success"
            [outlined]="true"
            (onClick)="exportarExcel()"
          ></p-button>
          <p-button
            label="PDF"
            icon="pi pi-file-pdf"
            severity="danger"
            [outlined]="true"
            (onClick)="exportarPDF()"
          ></p-button>
        </div>
      </div>

      <p-table
        [columns]="columnasDinamicas"
        [value]="datosReporte"
        [loading]="cargando"
        styleClass="p-datatable-striped p-datatable-sm"
        [paginator]="true"
        [rows]="10"
        [showCurrentPageReport]="true"
        currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} registros"
      >
        <ng-template #header let-columns>
          <tr>
            <th
              *ngFor="let col of columns"
              class="bg-surface-100 dark:bg-surface-800 text-surface-900 dark:text-surface-0 font-bold"
            >
              {{ col.header }}
            </th>
          </tr>
        </ng-template>

        <ng-template #body let-rowData let-columns="columns">
          <tr>
            <td *ngFor="let col of columns">
              {{ rowData[col.field] }}
            </td>
          </tr>
        </ng-template>

        <ng-template #emptymessage>
          <tr>
            <td [attr.colspan]="columnasDinamicas.length" class="text-center p-4">
              No se encontraron datos para los filtros seleccionados.
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </div>
</div>
